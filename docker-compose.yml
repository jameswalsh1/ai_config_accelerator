services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_config_wizard}
      MYSQL_USER: ${MYSQL_USER:-ai_config_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ai_config_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ai_config_root_password}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-ai_config_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      # Set ALLOWED_ORIGINS to your production domain(s), comma-separated.
      # e.g. ALLOWED_ORIGINS=https://example.com,https://www.example.com
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - DATABASE_URL=${DATABASE_URL:-mysql+asyncmy://ai_config_user:ai_config_password@mysql:3306/ai_config_wizard}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DB_SSL_CA=${DB_SSL_CA:-}
      - DB_SSL_MODE=${DB_SSL_MODE:-DISABLED}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_POOL_MAX_OVERFLOW=${DB_POOL_MAX_OVERFLOW:-20}
      - DB_POOL_RECYCLE=${DB_POOL_RECYCLE:-1800}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
