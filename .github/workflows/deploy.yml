name: CI/CD — Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Customise these env vars to match your Azure setup ───────────────────────
env:
  AZURE_RESOURCE_GROUP: amar-pethkar-sandbox-rg
  AZURE_LOCATION: uksouth
  # DNS labels must be globally unique within the region.
  # Your services will be reachable at:
  #   http://<label>.<location>.azurecontainer.io
  BACKEND_DNS_LABEL: ai-accel-backend
  FRONTEND_DNS_LABEL: ai-accel-frontend
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure & registry auth ───────────────────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build & push images ─────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/backend:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          # VITE_API_BASE_URL is baked into the static bundle at build time.
          build-args: |
            VITE_API_BASE_URL=http://${{ env.BACKEND_DNS_LABEL }}.${{ env.AZURE_LOCATION }}.azurecontainer.io:8000
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/frontend:buildcache,mode=max

      # ── Deploy to Azure Container Instances ─────────────────────────────
      - name: Deploy backend to ACI
        uses: azure/cli@v2
        # Pass secrets through env so they are not interpolated into the YAML
        # string (avoids quoting issues with special characters).
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          azcliversion: latest
          inlineScript: |
            FRONTEND_ORIGIN="http://${{ env.FRONTEND_DNS_LABEL }}.${{ env.AZURE_LOCATION }}.azurecontainer.io"

            # Delete first to guarantee the new image is picked up cleanly.
            az container delete \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "ai-accel-backend" \
              --yes 2>/dev/null || true

            az container create \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "ai-accel-backend" \
              --image "${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}" \
              --registry-login-server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --registry-username "${{ secrets.ACR_USERNAME }}" \
              --registry-password "${ACR_PASSWORD}" \
              --cpu 1 \
              --memory 1.5 \
              --ports 8000 \
              --ip-address Public \
              --dns-name-label "${{ env.BACKEND_DNS_LABEL }}" \
              --os-type Linux \
              --restart-policy Always \
              --environment-variables \
                AUTH_ENABLED=false \
                LOG_LEVEL=INFO \
                DB_SSL_MODE=REQUIRED \
                "ALLOWED_ORIGINS=${FRONTEND_ORIGIN}" \
              --secure-environment-variables \
                "DATABASE_URL=${DATABASE_URL}"

      - name: Deploy frontend to ACI
        uses: azure/cli@v2
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          azcliversion: latest
          inlineScript: |
            az container delete \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "ai-accel-frontend" \
              --yes 2>/dev/null || true

            az container create \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "ai-accel-frontend" \
              --image "${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}" \
              --registry-login-server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --registry-username "${{ secrets.ACR_USERNAME }}" \
              --registry-password "${ACR_PASSWORD}" \
              --cpu 0.5 \
              --memory 0.5 \
              --ports 80 \
              --ip-address Public \
              --dns-name-label "${{ env.FRONTEND_DNS_LABEL }}" \
              --os-type Linux \
              --restart-policy Always

      - name: Print access URLs
        run: |
          echo "=================================================="
          echo "  Backend:  http://${{ env.BACKEND_DNS_LABEL }}.${{ env.AZURE_LOCATION }}.azurecontainer.io:8000"
          echo "  API Docs: http://${{ env.BACKEND_DNS_LABEL }}.${{ env.AZURE_LOCATION }}.azurecontainer.io:8000/docs"
          echo "  Frontend: http://${{ env.FRONTEND_DNS_LABEL }}.${{ env.AZURE_LOCATION }}.azurecontainer.io"
          echo "=================================================="
